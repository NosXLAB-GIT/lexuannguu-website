<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexuannguu Wiki </title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00f2ff;
            --neon-yellow: #fefe33;
            --bg: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: url('https://cur.cursors-4u.net/games/gam-4/gam372.cur'), auto;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Comic Sans MS', 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Nền nhiễu sóng */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUuejgRTX18bc/giphy.gif');
            opacity: 0.05;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            padding-bottom: 100px;
        }

        .avatar-box {
            position: relative;
            z-index: 100;
            animation: bounce 2s infinite;
        }

        .main-avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px dashed var(--neon-yellow);
            padding: 10px;
            background: #000;
            transition: transform 0.3s;
        }

        .main-avatar img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .main-avatar:hover {
            transform: scale(1.2) rotate(10deg);
            border-color: var(--neon-pink);
        }

        .meme-wall {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
            max-width: 1000px;
        }

        .meme-card {
            width: 280px;
            background: #111;
            border: 3px solid white;
            border-radius: 10px;
            padding: 10px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 8px 8px 0px rgba(255, 255, 255, 0.1);
        }

        .meme-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .meme-card p {
            font-size: 14px;
            text-align: center;
            color: var(--neon-blue);
            font-weight: bold;
        }

        .meme-card:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 200;
            box-shadow: 0 0 30px var(--neon-pink);
            animation: shake 0.5s infinite;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            text-shadow: 3px 3px 0 var(--neon-pink), -3px -3px 0 var(--neon-blue);
            margin-top: 30px;
            text-align: center;
        }

        .subtitle {
            background: var(--neon-yellow);
            color: black;
            padding: 5px 15px;
            font-weight: 900;
            transform: skew(-10deg);
            margin-top: 10px;
        }

        /* Footer: Powered by NosXLAB */
        footer {
            margin-top: 60px;
            padding: 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            width: 100%;
        }

        .powered-by {
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: #555;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .powered-by span {
            color: var(--neon-blue);
            font-weight: 900;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        footer:hover .powered-by {
            color: #fff;
            letter-spacing: 5px;
        }

        /* Animations */
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0); }
        }

        @media (max-width: 600px) {
            .meme-card { width: 90%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-box">
            <div class="main-avatar">
                <img src="https://github.com/NosXLAB-GIT/lexuannguu-website/blob/main/568192825_1738721096750445_784827571960637875_n.png?raw=true" alt="Boss">
            </div>
        </div>

        <h1>LEXUANNGUU WIKI</h1>
        <div class="subtitle">DEMO VERSION</div>

        <div class="meme-wall">
            <div class="meme-card" style="transform: rotate(-3deg);">
                <img src="https://github.com/NosXLAB-GIT/lexuannguu-website/blob/main/675493123_2079986209251527_4933549213989958616_n.png?raw=true">
                <p>CODE CHẠY LÀ MAY RỒI</p>
            </div>
            <div class="meme-card" style="transform: rotate(2deg);">
                <img src="https://github.com/NosXLAB-GIT/lexuannguu-website/blob/main/677168780_988375313621487_505330018484153751_n.png?raw=true">
                <p>MÌNH LÀM VÌ ĐAM MÊ</p>
            </div>
            <div class="meme-card" style="transform: rotate(-2deg);">
                <img src="https://github.com/NosXLAB-GIT/lexuannguu-website/blob/main/678212155_994847826323884_9090406677020971255_n.png?raw=true">
                <p>DEBUG TỚI SÁNG</p>
            </div>
            <div class="meme-card" style="transform: rotate(4deg);">
                <img src="https://github.com/NosXLAB-GIT/lexuannguu-website/blob/main/680236593_2321679608324497_1358677169647068741_n.png?raw=true">
                <p>WIKI SẮP XONG (CHẮC THẾ)</p>
            </div>
        </div>

        <footer>
            <p class="powered-by">Powered by <span>NosXLAB Official</span></p>
        </footer>
    </div>

</body>
</html>
